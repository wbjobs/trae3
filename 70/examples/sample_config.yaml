app:
  name: my-application
  version: 1.0.0

server:
  host: 0.0.0.0
  port: 8080
  workers: 4

database:
  host: localhost
  port: 3306
  name: app_db
  user: admin
  max_connections: 100
  timeout: 30

cache:
  type: redis
  host: localhost
  port: 6379
  ttl: 3600

logging:
  level: INFO
  format: json
  file: /var/log/app.log

features:
  enable_new_ui: true
  enable_api_v2: false
  maintenance_mode: false
