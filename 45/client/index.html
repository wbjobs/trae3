<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>战术对战游戏</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="top-bar">
      <div class="logo">
        <span class="logo-icon">⚔️</span>
        <h1>战术对战</h1>
      </div>
      <div class="connection-status" id="connectionStatus">
        <span class="status-dot"></span>
        <span>未连接</span>
      </div>
    </header>

    <main class="main-content">
      <div id="lobby" class="lobby">
        <div class="lobby-container">
          <div class="lobby-header">
            <h2>游戏大厅</h2>
            <button class="btn btn-refresh" id="refreshBtn">🔄 刷新</button>
          </div>

          <div class="lobby-content">
            <div class="player-input-section">
              <label for="playerName">玩家名称</label>
              <input type="text" id="playerName" class="input" placeholder="请输入你的名称" maxlength="20">
            </div>

            <div class="game-list-section">
              <h3>可用游戏</h3>
              <div id="gameList" class="game-list">
                <div class="game-list-empty">加载中...</div>
              </div>
            </div>

            <div class="lobby-actions">
              <button class="btn btn-primary" id="createGameBtn">➕ 创建游戏</button>
              <button class="btn btn-secondary" id="joinGameBtn">🎮 加入游戏</button>
            </div>
          </div>
        </div>
      </div>

      <div id="game" class="game">
        <div class="game-canvas-container">
          <canvas id="gameCanvas"></canvas>
        </div>

        <aside class="info-panel">
          <div id="gameInfo" class="game-info">
            <div class="game-info-header">
              <h3>等待加入游戏...</h3>
            </div>
          </div>

          <div class="player-section">
            <h3>玩家列表</h3>
            <div id="playerList" class="player-list">
            </div>
          </div>

          <div class="chat-section">
            <h3>聊天</h3>
            <div id="chatMessages" class="chat-messages">
            </div>
            <div class="chat-input-container">
              <input type="text" id="chatInput" class="input chat-input" placeholder="输入消息..." maxlength="100">
              <button class="btn btn-send" id="chatSendBtn">发送</button>
            </div>
          </div>

          <div class="action-buttons">
            <button class="btn btn-ready" id="readyBtn" style="display: none;">准备</button>
            <button class="btn btn-start" id="startBtn" style="display: none;">开始游戏</button>
            <button class="btn btn-end-turn" id="endTurnBtn" style="display: none;">结束回合</button>
          </div>

          <div class="panel-section">
            <h3>战术方案</h3>
            <div class="tactical-plans-container">
              <div class="plan-input-row">
                <input type="text" id="planNameInput" class="input" placeholder="方案名称" maxlength="30">
                <button class="btn btn-small btn-primary" id="savePlanBtn">保存</button>
              </div>
              <div id="planList" class="plan-list">
                <div class="plan-list-empty">暂无方案</div>
              </div>
              <div class="plan-actions">
                <button class="btn btn-small btn-secondary" id="refreshPlansBtn">🔄 刷新</button>
              </div>
            </div>
          </div>

          <div class="panel-section">
            <h3>对局回放</h3>
            <div class="replay-container">
              <div class="replay-input-row">
                <input type="text" id="replayNameInput" class="input" placeholder="回放名称" maxlength="30">
                <button class="btn btn-small btn-primary" id="saveReplayBtn">保存</button>
              </div>
              <div id="replayList" class="replay-list">
                <div class="replay-list-empty">暂无回放</div>
              </div>
              <div class="replay-actions">
                <button class="btn btn-small btn-secondary" id="refreshReplaysBtn">🔄 刷新</button>
              </div>
              <div id="replayControls" class="replay-controls" style="display: none;">
                <div class="replay-progress">
                  <span id="replayProgressText">0 / 0</span>
                  <input type="range" id="replayProgressSlider" min="0" max="0" value="0">
                </div>
                <div class="replay-buttons">
                  <button class="btn btn-small" id="replayPlayBtn">▶️</button>
                  <button class="btn btn-small" id="replayPauseBtn">⏸️</button>
                  <button class="btn btn-small" id="replayStopBtn">⏹️</button>
                  <button class="btn btn-small" id="replayPrevBtn">⏮️</button>
                  <button class="btn btn-small" id="replayNextBtn">⏭️</button>
                  <select id="replaySpeedSelect" class="input small">
                    <option value="0.25">0.25x</option>
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="2">2x</option>
                    <option value="4">4x</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <footer class="status-bar">
      <div id="status" class="status-text">就绪</div>
    </footer>

    <div id="toast" class="toast"></div>
  </div>

  <script src="../dist/client/index.js"></script>
</body>
</html>
