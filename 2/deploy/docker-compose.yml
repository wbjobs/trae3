version: '3.8'

services:
  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: industrial-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_SERVER_MODE=release
      - GATEWAY_SERVER_HOST=0.0.0.0
      - GATEWAY_SERVER_PORT=8080
      - GATEWAY_DATABASE_HOST=postgres
      - GATEWAY_INFLUXDB_HOST=influxdb
      - GATEWAY_CLUSTER_ETCD_ENDPOINTS=etcd:2379
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
    depends_on:
      - postgres
      - influxdb
      - etcd
    networks:
      - gateway-net

  postgres:
    image: postgres:15-alpine
    container_name: gateway-postgres
    restart: always
    environment:
      - POSTGRES_DB=gateway
      - POSTGRES_USER=gateway
      - POSTGRES_PASSWORD=gateway_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - gateway-net

  influxdb:
    image: influxdb:2.7-alpine
    container_name: gateway-influxdb
    restart: always
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123456
      - DOCKER_INFLUXDB_INIT_ORG=industrial
      - DOCKER_INFLUXDB_INIT_BUCKET=gateway
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=gateway-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    networks:
      - gateway-net

  etcd:
    image: bitnami/etcd:3.5
    container_name: gateway-etcd
    restart: always
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
    volumes:
      - etcd-data:/bitnami/etcd
    ports:
      - "2379:2379"
      - "2380:2380"
    networks:
      - gateway-net

volumes:
  postgres-data:
  influxdb-data:
  etcd-data:

networks:
  gateway-net:
    driver: bridge
