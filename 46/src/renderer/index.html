<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数控程序管理器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-left">
        <h1 class="app-title">数控程序管理器</h1>
        <span class="app-version">v1.0.0</span>
      </div>
      <div class="header-right">
        <div class="sync-status" id="syncStatus">
          <span class="status-dot offline"></span>
          <span class="status-text">未连接</span>
        </div>
        <button class="btn btn-icon" id="btnSync" title="同步">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a6 6 0 0 0-5.27 3.13L1.3 3.7l-.7.72L2.6 6.4l.72-.7-1.4-1.38A5 5 0 0 1 8 3V2zm5.27 3.13A6 6 0 0 0 8 2v1a5 5 0 0 1 5.08 3.32l-1.4 1.38.72.7 1.98-1.98-.72-.7-1.39 1.41zM8 14a6 6 0 0 0 5.27-3.13l1.39 1.42.7-.72-1.98-1.98-.72.7 1.4 1.38A5 5 0 0 1 8 13v1zm-5.27-3.13A6 6 0 0 0 8 14v-1a5 5 0 0 1-5.08-3.32l1.4-1.38-.72-.7-1.98 1.98.72.7 1.39-1.41z"/></svg>
        </button>
        <button class="btn btn-icon" id="btnSettings" title="设置">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.116l.094-.318z"/></svg>
        </button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-title">模块</div>
          <button class="nav-item active" data-view="files">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h2.764c.958 0 1.76.56 2.311 1.184C7.985 3.648 8.48 4 9 4h4.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5v-9zM2.5 3a.5.5 0 0 0-.5.5V6h12v-.5a.5.5 0 0 0-.5-.5H9c-.964 0-1.71-.629-2.174-1.222C6.374 3.714 5.82 3.5 5.264 3.5H2.5zM14 7H2v5.5a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5V7z"/></svg>
            文件管理
          </button>
          <button class="nav-item" data-view="parser">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M5 0h6a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2zm0 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H5z"/><path d="M5.5 3h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1 0-1zm0 2h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1 0-1zm0 2h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1 0-1z"/></svg>
            程序解析
          </button>
          <button class="nav-item" data-view="converter">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M7.5 1a.5.5 0 0 1 .5.5v6.5H9.5a.5.5 0 0 1 0 1H8v6.5a.5.5 0 0 1-1 0V9H5.5a.5.5 0 0 1 0-1H7V1.5a.5.5 0 0 1 .5-.5zm-3 2a.5.5 0 0 1 .5.5V6H3.5a.5.5 0 0 1 0-1H4V3.5a.5.5 0 0 1 .5-.5zm6 0a.5.5 0 0 1 .5.5V5h.5a.5.5 0 0 1 0 1H11V3.5a.5.5 0 0 1 .5-.5z"/></svg>
            格式转换
          </button>
          <button class="nav-item" data-view="sync">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a5.53 5.53 0 0 0-3.594 1.322c-.766.66-1.321 1.52-1.464 2.383C1.266 6.095 0 7.555 0 9.318 0 11.366 1.708 13 3.781 13h8.906C14.502 13 16 11.57 16 9.773c0-1.636-1.242-2.969-2.834-3.194C12.923 3.999 10.69 2 8 2zm2.354 5.146a.5.5 0 0 1-.708.708L8.5 6.707V10.5a.5.5 0 0 1-1 0V6.707L6.354 7.854a.5.5 0 1 1-.708-.708l2-2a.5.5 0 0 1 .708 0l2 2z"/></svg>
            远程同步
          </button>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">信息</div>
          <div class="sidebar-info" id="statsInfo">
            <div class="info-row"><span>文件总数</span><span id="statFiles">0</span></div>
            <div class="info-row"><span>版本总数</span><span id="statVersions">0</span></div>
            <div class="info-row"><span>存储占用</span><span id="statSize">0 B</span></div>
          </div>
        </div>
      </nav>

      <main class="content">
        <div class="view active" id="view-files">
          <div class="view-header">
            <h2>文件管理</h2>
            <div class="view-actions">
              <button class="btn btn-primary" id="btnImport">导入文件</button>
              <button class="btn btn-secondary" id="btnNewFile">新建程序</button>
            </div>
          </div>
          <div class="file-search">
            <input type="text" id="searchInput" placeholder="搜索文件名..." class="input">
            <select id="filterFormat" class="input select">
              <option value="">所有格式</option>
              <option value="fanuc">Fanuc</option>
              <option value="siemens">Siemens</option>
              <option value="heidenhain">Heidenhain</option>
              <option value="iso">ISO</option>
              <option value="haas">Haas</option>
            </select>
          </div>
          <div class="file-list" id="fileList">
            <div class="empty-state">
              <p>暂无文件，点击"导入文件"开始使用</p>
            </div>
          </div>
        </div>

        <div class="view" id="view-parser">
          <div class="view-header">
            <h2>程序解析</h2>
            <div class="view-actions">
              <select id="parseFormat" class="input select">
                <option value="fanuc">Fanuc</option>
                <option value="siemens">Siemens</option>
                <option value="heidenhain">Heidenhain</option>
                <option value="iso">ISO</option>
                <option value="haas">Haas</option>
              </select>
              <button class="btn btn-primary" id="btnParse">解析</button>
              <button class="btn btn-secondary" id="btnValidate">校验</button>
            </div>
          </div>
          <div class="split-pane">
            <div class="pane editor-pane">
              <div class="pane-header">程序源码</div>
              <textarea id="parseInput" class="code-editor" placeholder="在此输入或粘贴数控程序代码..." spellcheck="false"></textarea>
            </div>
            <div class="pane result-pane">
              <div class="pane-header">解析结果</div>
              <div class="result-tabs">
                <button class="tab active" data-tab="parsed-commands">指令列表</button>
                <button class="tab" data-tab="parsed-metadata">元数据</button>
                <button class="tab" data-tab="parsed-errors">错误/警告</button>
              </div>
              <div class="tab-content active" id="parsed-commands">
                <div class="result-empty">点击"解析"按钮查看结果</div>
              </div>
              <div class="tab-content" id="parsed-metadata">
                <div class="result-empty">点击"解析"按钮查看结果</div>
              </div>
              <div class="tab-content" id="parsed-errors">
                <div class="result-empty">点击"解析"按钮查看结果</div>
              </div>
            </div>
          </div>
        </div>

        <div class="view" id="view-converter">
          <div class="view-header">
            <h2>格式转换</h2>
          </div>
          <div class="converter-config">
            <div class="converter-direction">
              <div class="format-select">
                <label>源格式</label>
                <select id="convSourceFormat" class="input select">
                  <option value="fanuc">Fanuc</option>
                  <option value="siemens">Siemens</option>
                  <option value="heidenhain">Heidenhain</option>
                  <option value="iso">ISO</option>
                  <option value="haas">Haas</option>
                </select>
              </div>
              <div class="direction-arrow">
                <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/></svg>
              </div>
              <div class="format-select">
                <label>目标格式</label>
                <select id="convTargetFormat" class="input select">
                  <option value="siemens">Siemens</option>
                  <option value="fanuc">Fanuc</option>
                  <option value="heidenhain">Heidenhain</option>
                  <option value="iso">ISO</option>
                  <option value="haas">Haas</option>
                </select>
              </div>
            </div>
            <button class="btn btn-primary" id="btnConvert">转换</button>
          </div>
          <div class="split-pane">
            <div class="pane editor-pane">
              <div class="pane-header">源程序</div>
              <textarea id="convInput" class="code-editor" placeholder="在此输入源格式程序..." spellcheck="false"></textarea>
            </div>
            <div class="pane result-pane">
              <div class="pane-header">转换结果</div>
              <textarea id="convOutput" class="code-editor" readonly placeholder="转换结果将在此显示..." spellcheck="false"></textarea>
            </div>
          </div>
          <div class="conversion-stats" id="conversionStats" style="display:none">
            <span>已转换: <strong id="convConverted">0</strong></span>
            <span>跳过: <strong id="convSkipped">0</strong></span>
            <span>未映射: <strong id="convUnmapped">0</strong></span>
            <div id="convWarnings" class="warnings"></div>
          </div>
        </div>

        <div class="view" id="view-sync">
          <div class="view-header">
            <h2>远程同步</h2>
            <div class="view-actions">
              <button class="btn btn-primary" id="btnSyncNow">立即同步</button>
              <button class="btn btn-secondary" id="btnSyncStop">停止同步</button>
            </div>
          </div>
          <div class="sync-config-panel">
            <h3>同步配置</h3>
            <div class="form-grid">
              <div class="form-group">
                <label>服务器地址</label>
                <input type="text" id="syncServerUrl" class="input" placeholder="http://localhost:8080">
              </div>
              <div class="form-group">
                <label>API Key</label>
                <input type="password" id="syncApiKey" class="input" placeholder="输入API密钥">
              </div>
              <div class="form-group">
                <label>同步间隔(秒)</label>
                <input type="number" id="syncInterval" class="input" value="300" min="30">
              </div>
              <div class="form-group">
                <label>冲突策略</label>
                <select id="syncConflictStrategy" class="input select">
                  <option value="manual">手动解决</option>
                  <option value="local-wins">本地优先</option>
                  <option value="remote-wins">远程优先</option>
                </select>
              </div>
              <div class="form-group">
                <label class="checkbox-label">
                  <input type="checkbox" id="syncAutoSync"> 自动同步
                </label>
              </div>
              <div class="form-group">
                <button class="btn btn-secondary" id="btnSaveSyncConfig">保存配置</button>
              </div>
            </div>
          </div>
          <div class="sync-status-panel">
            <h3>同步状态</h3>
            <div class="sync-detail" id="syncDetail">
              <div class="sync-detail-row"><span>上次同步</span><span id="lastSyncTime">从未</span></div>
              <div class="sync-detail-row"><span>同步状态</span><span id="syncState">未启动</span></div>
              <div class="sync-detail-row"><span>待上传</span><span id="pendingUploads">0</span></div>
              <div class="sync-detail-row"><span>待下载</span><span id="pendingDownloads">0</span></div>
              <div class="sync-detail-row"><span>冲突数</span><span id="conflictCount">0</span></div>
            </div>
          </div>
          <div class="sync-conflicts-panel" id="conflictsPanel" style="display:none">
            <h3>冲突列表</h3>
            <div id="conflictsList"></div>
          </div>
          <div class="sync-errors-panel" id="syncErrorsPanel" style="display:none">
            <h3>错误日志</h3>
            <div id="syncErrorsList"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
