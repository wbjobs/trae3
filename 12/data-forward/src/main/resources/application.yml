server:
  port: ${SERVER_PORT:8085}
  servlet:
    context-path: /

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:3}
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

dataplatform:
  url: ${DATAPLATFORM_URL:http://127.0.0.1:9000/api/data/receive}
  app-key: ${DATAPLATFORM_APP_KEY:smartmeter-gateway}
  app-secret: ${DATAPLATFORM_APP_SECRET:smartmeter-secret-2024}
  batch-size: ${DATAPLATFORM_BATCH_SIZE:50}
  max-retry: ${DATAPLATFORM_MAX_RETRY:3}
  timeout: ${DATAPLATFORM_TIMEOUT:10000}
  forward-interval: ${DATAPLATFORM_FORWARD_INTERVAL:5000}

feign:
  client:
    config:
      default:
        connectTimeout: 10000
        readTimeout: 10000
  httpclient:
    enabled: true
    max-connections: 200
    max-connections-per-route: 50

logging:
  level:
    com.smartmeter: ${LOG_LEVEL:INFO}
    org.springframework: WARN
    com.smartmeter.forward.feign: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
