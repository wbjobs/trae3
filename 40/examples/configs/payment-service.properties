# Payment Service Configuration
service.name=payment-service
service.version=1.2.3
service.profile=prod
service.type=web

server.port=8082
server.host=payment.example.com
server.context-path=/api

database.url=jdbc:mysql://db-prod:3306/payment
database.username=payment_user
database.max-pool-size=50

redis.host=redis-prod
redis.port=6379
redis.timeout=10000

logging.level.root=WARN
logging.level.com.payment=INFO

management.security.enabled=true
