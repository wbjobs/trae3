<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分组管理 - 工业设备运维时序数据分析平台</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h1>
                    <span class="logo-icon">⚙️</span>
                    IoT Analytics
                </h1>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="../index.html" class="nav-link">
                            <span class="nav-icon">📊</span>
                            <span>数据看板</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="devices.html" class="nav-link">
                            <span class="nav-icon">🔧</span>
                            <span>设备管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="groups.html" class="nav-link active">
                            <span class="nav-icon">📁</span>
                            <span>分组管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="heatmap.html" class="nav-link">
                            <span class="nav-icon">🔥</span>
                            <span>热力图分析</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="reports.html" class="nav-link">
                            <span class="nav-icon">📋</span>
                            <span>报表中心</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">分组管理</h1>
                <div class="page-actions">
                    <button class="btn btn-primary" onclick="openAddGroupModal()">
                        ➕ 添加分组
                    </button>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3 class="chart-title">设备分组统计</h3>
                    </div>
                    <div class="chart-container" id="group-pie-chart"></div>
                </div>
                <div class="chart-card">
                    <div class="chart-header">
                        <h3 class="chart-title">各分组设备数量</h3>
                    </div>
                    <div class="chart-container" id="group-bar-chart"></div>
                </div>
            </div>

            <div class="chart-card full-width">
                <div class="chart-header">
                    <h3 class="chart-title">分组列表</h3>
                </div>
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>分组ID</th>
                                <th>分组名称</th>
                                <th>描述</th>
                                <th>设备数量</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="group-table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="group-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="group-modal-title">添加分组</h3>
                <button class="modal-close" onclick="closeModal('group-modal')">×</button>
            </div>
            <div class="modal-body">
                <form id="group-form">
                    <div class="form-group">
                        <label class="form-label">分组ID</label>
                        <input type="text" class="form-input" id="group-id" placeholder="例如: group_production" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">分组名称</label>
                        <input type="text" class="form-input" id="group-name" placeholder="例如: 生产设备组" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">分组描述</label>
                        <textarea class="form-input" id="group-description" rows="3" placeholder="请输入分组描述..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('group-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveGroup()">保存</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/charts.js"></script>
    <script src="../js/groups.js"></script>
</body>
</html>
