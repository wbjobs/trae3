version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: train-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: train_status
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - train-network

  redis:
    image: redis:7-alpine
    container_name: train-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - train-network

  rocketmq-namesrv:
    image: apache/rocketmq:4.9.7
    container_name: train-rocketmq-namesrv
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT: "-Duser.home=/opt"
      TZ: Asia/Shanghai
    volumes:
      - rocketmq-namesrv-data:/root/logs
      - rocketmq-namesrv-store:/root/store
    command: sh mqnamesrv
    healthcheck:
      test: ["CMD", "sh", "-c", "mqadmin clusterList -n localhost:9876 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - train-network

  rocketmq-broker:
    image: apache/rocketmq:4.9.7
    container_name: train-rocketmq-broker
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      JAVA_OPT: "-Duser.home=/opt -Xms512m -Xmx1024m"
      TZ: Asia/Shanghai
      NAMESRV_ADDR: rocketmq-namesrv:9876
    volumes:
      - ./rocketmq-broker-data:/root/logs
      - rocketmq-broker-store:/root/store
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876
    healthcheck:
      test: ["CMD", "sh", "-c", "mqadmin clusterList -n rocketmq-namesrv:9876 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - train-network

  train-status-service-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: train-status-service-1
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: train_status
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ROCKETMQ_NAMESRV: rocketmq-namesrv:9876
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms512m -Xmx1024m"
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - train-network

  train-status-service-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: train-status-service-2
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: train_status
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ROCKETMQ_NAMESRV: rocketmq-namesrv:9876
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms512m -Xmx1024m"
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - train-network

  nginx:
    image: nginx:alpine
    container_name: train-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - train-status-service-1
      - train-status-service-2
    restart: unless-stopped
    networks:
      - train-network

volumes:
  mysql-data:
  redis-data:
  rocketmq-namesrv-data:
  rocketmq-namesrv-store:
  rocketmq-broker-data:
  rocketmq-broker-store:

networks:
  train-network:
    driver: bridge
