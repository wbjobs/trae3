server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:train_status}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:train_status}
    password: ${MYSQL_PASSWORD:changeme}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:changeme}

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:rocketmq:9876}

logging:
  level:
    com.railway: INFO
    org.apache.rocketmq: ERROR
  file:
    name: /var/log/train-status/train-status-service.log
    path: /var/log/train-status/
