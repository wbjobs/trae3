server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 200
      min-spare: 20
    max-connections: 10000
    accept-count: 200
    connection-timeout: 30000
    keep-alive-timeout: 60000

spring:
  application:
    name: train-status-service
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:train_status}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      leak-detection-threshold: 20000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      connect-timeout: 5000ms
      lettuce:
        pool:
          min-idle: 10
          max-active: 50
          max-idle: 20
          max-wait: 2000ms
        shutdown-timeout: 100ms

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:localhost:9876}
  producer:
    group: train-status-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 0
    retry-times-when-send-async-failed: 0
    batch-max-size: 4096
  consumer:
    group: train-status-consumer-group
    consume-thread-min: 8
    consume-thread-max: 32
    pull-batch-size: 32
    pull-interval: 0

app:
  rate-limit:
    enabled: true
    global-qps: 10000
    per-ip-qps: 100
  consumer:
    backpressure-threshold: 10000
    drop-old-data: false
  compression:
    enabled: true
    threshold-bytes: 512
  batch:
    enabled: true
    max-batch-size: 100
  circuit-breaker:
    mysql:
      failure-threshold: 20
      timeout-seconds: 30
    rocketmq:
      failure-threshold: 50
      timeout-seconds: 15
    redis:
      failure-threshold: 30
      timeout-seconds: 20

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.railway.common.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: railway-train-status-secret-key-2024
  expire-seconds: 7200
  issuer: railway-system

auth:
  default-username: admin
  default-password: admin123

train:
  filter:
    blacklist:
    max-delay-minutes: 30
    max-future-minutes: 5

logging:
  level:
    root: INFO
    com.railway: DEBUG
    org.apache.rocketmq: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,beans,env
  endpoint:
    health:
      show-details: always
