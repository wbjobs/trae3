server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: ancient-platform
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ancient_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&tinyInt1isBit=false
    username: root
    password: root
    hikari:
      connection-timeout: 30000
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 60000
      max-lifetime: 1800000

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3s
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 10
          min-idle: 5

  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
        keep-alive: 60s
      thread-name-prefix: async-search-

  data:
    elasticsearch:
      uris: http://localhost:9200
      username:
      password:
      connection-timeout: 10s
      socket-timeout: 30s

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

cache:
  ttl:
    search-result: 600000
    search-suggest: 1800000
    hot-keywords: 3600000

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.ancient.platform.**.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ancient-platform-secret-key-2024-abcdefghijklmnopqrstuvwxyz
  expire: 86400
  refresh-expire: 604800
  prefix: "Bearer "
  header: Authorization

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: ancient-platform
  preview-expiry: 3600

image:
  compression:
    default-quality: 0.8
    default-format: webp
    thumbnail:
      sizes:
        - 200
        - 400
        - 800
    pyramid:
      tile-size: 256

logging:
  level:
    root: info
    com.ancient.platform: debug
    org.springframework.security: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/ancient-platform.log
    max-size: 10MB
    max-history: 30

distributed-lock:
  lease-time: 30s
  wait-time: 5s

rate-limit:
  default: 100 requests/minute

notification:
  batch:
    enabled: true
    interval: 1000ms

---
spring:
  config:
    activate:
      on-profile: dev
  devtools:
    restart:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: prod
  devtools:
    restart:
      enabled: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    root: warn
    com.ancient.platform: info
