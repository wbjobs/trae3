<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地块引擎 - Plot Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; }

    #game-container { width: 100vw; height: 100vh; }

    #join-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    #join-overlay .dialog {
      background: #252540; border-radius: 12px; padding: 32px; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #join-overlay h2 { margin-bottom: 16px; color: #7ec850; }
    #join-overlay input {
      width: 220px; padding: 10px 14px; border: 1px solid #444; border-radius: 6px;
      background: #1a1a2e; color: #e0e0e0; font-size: 14px;
    }
    #join-overlay button {
      display: block; margin: 16px auto 0; padding: 10px 32px;
      background: #7ec850; color: #1a1a2e; border: none; border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    #join-overlay button:hover { background: #6ab840; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; background: rgba(20,20,40,0.85);
      border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 10;
      pointer-events: none;
    }
    #hud > * { pointer-events: auto; }
    #resources { display: flex; gap: 16px; font-size: 14px; font-weight: 500; }
    #resources span { white-space: nowrap; }
    #tick-display { font-size: 12px; color: #888; }

    #side-panel {
      position: fixed; right: 0; top: 52px; bottom: 0; width: 260px;
      background: rgba(20,20,40,0.9); border-left: 1px solid rgba(255,255,255,0.1);
      padding: 16px; z-index: 10; overflow-y: auto;
    }
    #side-panel h3 { font-size: 14px; color: #7ec850; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

    #plot-info { margin-bottom: 20px; }
    .info-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .info-row span:first-child { color: #888; }

    #build-panel { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .build-btn {
      padding: 6px 10px; background: #2a2a4a; border: 1px solid #3a3a5a;
      border-radius: 4px; color: #ccc; font-size: 12px; cursor: pointer;
    }
    .build-btn:hover { background: #3a3a5a; }
    .build-btn.active { border-color: #7ec850; color: #7ec850; background: rgba(126,200,80,0.1); }

    #build-action, #demolish-action {
      padding: 8px 20px; border: none; border-radius: 4px; font-size: 13px;
      font-weight: 600; cursor: pointer; margin-right: 8px;
    }
    #build-action { background: #7ec850; color: #1a1a2e; }
    #build-action:hover { background: #6ab840; }
    #demolish-action { background: #c0392b; color: #fff; }
    #demolish-action:hover { background: #a93226; }

    #player-list { margin-top: 16px; }
    .player-item { padding: 3px 0; font-size: 12px; }

    #toast-container {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center;
    }
    .toast {
      background: rgba(40,40,70,0.95); padding: 10px 24px; border-radius: 6px;
      font-size: 13px; box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      animation: slideIn 0.2s ease;
    }
    .toast.fade-out { animation: fadeOut 0.3s ease forwards; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="join-overlay">
    <div class="dialog">
      <h2>地块引擎</h2>
      <input type="text" id="player-name" placeholder="输入玩家名称" maxlength="16" />
      <button id="join-btn">加入对局</button>
    </div>
  </div>

  <div id="hud">
    <div id="resources"></div>
    <div id="tick-display">Tick: 0</div>
  </div>

  <div id="side-panel">
    <h3>地块信息</h3>
    <div id="plot-info"><span style="color:#666">点击地块查看信息</span></div>

    <h3>建筑面板</h3>
    <div id="build-panel"></div>

    <h3>玩家列表</h3>
    <div id="player-list"></div>
  </div>

  <div id="toast-container"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
