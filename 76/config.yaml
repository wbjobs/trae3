app:
  name: SimPlatform
  version: 1.0.0
  language: zh_CN
  theme: default

cloud:
  program_library:
    base_url: https://api.example.com/program-library
    timeout: 30
    retry_count: 3
    retry_delay: 5
  version_database:
    base_url: https://api.example.com/version-database
    timeout: 30
    retry_count: 3
    retry_delay: 5
  auth:
    token_endpoint: /auth/token
    refresh_endpoint: /auth/refresh

sync:
  auto_sync: true
  sync_interval: 300
  conflict_strategy: manual
  max_retries: 5
  batch_size: 50

cache:
  db_path: ./data/cache.db
  max_size_mb: 512
  eviction_policy: lru
  ttl_seconds: 86400

simulator:
  max_concurrent_tasks: 4
  default_timeout: 3600
  workspace: ./data/workspace
  log_level: INFO

version:
  storage_path: ./data/versions
  max_versions: 100
  auto_commit: false

logging:
  level: INFO
  file: ./logs/sim-platform.log
  max_bytes: 10485760
  backup_count: 5
